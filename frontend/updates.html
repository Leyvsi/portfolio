<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<h1>Les Petits Enquêteurs</h1>
</header>

<nav>
<ul class="navbar">
<li><a href="index.html">Accueil</a></li>
<li><a href="histoires.html">Les Histoires</a></li>

</ul>

<main class="content-section">
<h2>Mises à jour des enquêtes</h2>

<div class="form-group" style="margin-bottom: 30px;">
<label for="update-case-selector" style="display:block; margin-bottom:10px; font-size:1.2rem;">Sélectionnez une affaire pour voir ses développements :</label>
<select id="update-case-selector" style="width:100%; padding:12px; background:#1a1a1c; color:#fff; border:1px solid #444; border-radius:4px; font-size:1.1rem;">
<option value="cc1">Le Mystère d'Anthonioz : Les Empreintes de la Nuit</option>
<option value="cc2">L'Inconnue de la Plage de Noirval</option>
<option value="cc3">Le Vol 814 : Le Passager Fantôme</option>
</select>
</div>

<h3>Évolution du Dossier & Actus</h3>
<div id="updates-list"></div>
</main>

<footer>
<p>&copy; Les Petits Enquêteurs. 2026 - Tous droits réservés.</p>
</footer>

<script>
const updateSelector = document.getElementById('update-case-selector');
const updatesList = document.getElementById('updates-list');

const urlParams = new URLSearchParams(window.location.search);
const caseParam = urlParams.get('case');
if (caseParam) {
updateSelector.value = caseParam;
}

const mockUpdates = {
"cc1": [
{ "date": "14 Avril 2026", "text": "Nouvel examen des scellés de la veste de Marc Anthonioz à l'aide de filtres spectraux modernes pour rechercher d'éventuelles micro-traces de solvants." },
{ "date": "12 Janvier 2026", "text": "Commémoration des 32 ans de la disparition. Un appel à témoins citoyen a été relancé dans la région des Carroz par un collectif d'habitants." }
],
"cc2": [
{ "date": "02 Mai 2026", "text": "Une correspondance partielle d'empreinte digitale a été rejetée par la base de données internationale Interpol. La piste européenne reste à l'étude." }
],
"cc3": [
{ "date": "21 Juin 2026", "text": "Une contre-expertise complète des registres de maintenance de la cabine pressurisée confirme qu'aucune anomalie de structure n'a été ignorée." }
]
};

function displayUpdates(caseId) {
updatesList.innerHTML = '';
const updates = mockUpdates[caseId] || [];

if (updates.length === 0) {
updatesList.innerHTML = '<p style="color:#aaa;">Aucune mise à jour récente sur cette affaire en cours.</p>';
return;
}

updates.forEach(up => {
const block = document.createElement('div');
block.style.background = '#0f0f10';
block.style.border = '1px solid #333';
block.style.padding = '20px';
block.style.borderRadius = '6px';
block.style.marginBottom = '15px';

block.innerHTML = `
<span style="color:#c0392b; font-weight:bold; font-size:0.9rem; display:block; margin-bottom:5px;">[UPDATE - ${up.date}]</span>
<p style="color:#fff; margin:0; line-height:1.6;">${up.text}</p>
`;
updatesList.appendChild(block);
});
}

updateSelector.addEventListener('change', (e) => displayUpdates(e.target.value));
displayUpdates(updateSelector.value);
</script>
</body>
</html>
