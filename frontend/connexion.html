<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Enquêteurs - Connexion</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* --- DESIGN INSPIRÉ DE L'IMAGE EXEMPLE --- */
        .login-card {
            background-color: #0c0c0e;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid #161619;
            margin: auto;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Label petit et propre placé au-dessus */
        .input-group label {
            color: #8c8e93;
            font-size: 0.85rem;
            font-weight: 600;
            padding-left: 4px;
        }

        /* Grands champs de saisie blancs et arrondis (style "pilule") comme sur la photo */
        .input-group input {
            background-color: #ffffff;
            border: none;
            color: #000000;
            padding: 14px 20px;
            border-radius: 30px; /* Arrondi maximal identique à l'image */
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            transition: box-shadow 0.2s ease;
        }

        /* Changement de couleur du texte indicatif (placeholder) */
        .input-group input::placeholder {
            color: #b0b2b8;
        }

        /* Case à cocher "Se souvenir de moi" */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8c8e93;
            font-size: 0.85rem;
            margin-top: -5px;
            padding-left: 4px;
        }

        .remember-me input {
            cursor: pointer;
        }

        /* Gros bouton de soumission étiré style Pilule */
        .btn-submit-pill {
            background: linear-gradient(135deg, #ba3a1a, #e66d27);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 30px; /* Rond comme sur l'image */
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase; /* Écrit en MAJUSCULES comme sur l'image */
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(230, 110, 40, 0.25);
            transition: all 0.2s ease;
        }

        .btn-submit-pill:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Liens du bas */
        .bottom-links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding: 0 4px;
            font-size: 0.85rem;
            border-top: 1px solid #161619;
            padding-top: 20px;
        }

        .bottom-links a {
            color: #e66e28;
            text-decoration: none;
            font-weight: 500;
        }

        .bottom-links a:hover {
            color: #ffffff;
        }

        /* Bouton Retour à l'accueil discret tout en bas */
        .back-home-container {
            margin-top: 25px;
            text-align: center;
        }
        
        .back-home-link {
            color: #4a4b4e;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }
        
        .back-home-link:hover {
            color: #8c8e93;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header class="main-header">
        <div class="header-spacer"></div>
        <h1>Les Petits Enquêteurs</h1>
        <div></div>
    </header>

    <main class="content-section">
        <div class="login-card">
            <h2 class="login-title">Formulaire de connexion</h2>
            
            <form class="form-container">
                <div class="input-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" placeholder="Enter your Username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="Enter your Password" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label style="display:inline; color:inherit; font-weight:normal;" for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-submit-pill">
                    Connexion
                </button>
            </form>

            <div class="bottom-links">
                <a href="inscription.html">Vous n'avez pas de compte ?</a>
                <a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a>
            </div>
        </div>

        <div class="back-home-container">
            <a href="index.html" class="back-home-link">← Retour à l'accueil</a>
        </div>
    </main>

    <footer>
        <p>&copy; Les Petits Enquêteurs. 2026 - Tous droits réservés.</p>
    </footer>

</body>
</html>
