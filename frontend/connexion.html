<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Petits Enquêteurs - Connexion</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}
.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}
#bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(11, 11, 13, 0.8);
}
.main-header {
    z-index: 1;
}
.auth-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    padding: 20px;
}
.auth-wrapper .content-section {
    margin: 0;
    width: 100%;
    max-width: 450px;
}
.admin-access {
    text-align: center;
    padding: 30px;
    z-index: 1;
}
.btn-admin {
    background: transparent;
    color: #ffffff;
    border: 2px solid var(--accent-color);
    padding: 8px 20px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 0.9rem;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 0 10px rgba(192, 57, 43, 0.2);
}
.btn-admin:hover {
    background: var(--gradient-accent);
    transform: translateY(-1px);
    box-shadow: 0 0 15px rgba(214, 48, 49, 0.4);
}
.toggle-text {
    text-align: center;
    margin-top: 20px;
    color: var(--text-main);
    font-size: 0.95rem;
}
.toggle-text a {
    color: #d63031;
    text-decoration: none;
    font-weight: 500;
}
.toggle-text a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="video-container">
<video autoplay loop muted playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
</div>

<header class="main-header">
    <h1>Les Petits Enquêteurs</h1>
</header>

<div class="auth-wrapper">
    <main class="content-section" id="login-box">
        <h2>Connexion Utilisateur</h2>
        <form class="submission-form" id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Votre email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-form-button">Se connecter</button>
        </form>
        <p class="toggle-text">Toujours pas de compte ? <a href="#" id="show-register">Inscrivez-vous ici !</a></p>
    </main>

    <main class="content-section" id="register-box" style="display: none;">
        <h2>Inscription</h2>
        <form class="submission-form" id="register-form">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="reg-username" placeholder="Identifiant" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Votre email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-password" placeholder="••••••••" maxlength="50" required>
            </div>
            <button type="submit" class="submit-form-button">S'inscrire</button>
        </form>
        <p class="toggle-text">Déjà un compte ? <a href="#" id="show-login">Connectez-vous ici !</a></p>
    </main>
</div>

<div class="admin-access">
    <a href="admin-connexion.html" class="btn-admin">Pour les admins</a>
</div>

<script>
    document.getElementById('show-register').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('register-box').style.display = 'block';
    });

    document.getElementById('show-login').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('register-box').style.display = 'none';
        document.getElementById('login-box').style.display = 'block';
    });

    document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        
        const hasUpper = /[A-Z]/.test(password);
        const hasLower = /[a-z]/.test(password);
        const hasDigit = /[0-9]/.test(password);
        const hasSpecial = /[!@#$%^&*(),.?":{}|<>_\-+=\[\]~/\\\';`~]/.test(password); 
        const isValidLength = password.length >= 8 && password.length <= 50;

        if (!hasUpper || !hasLower || !hasDigit || !hasSpecial || !isValidLength) {
            alert("Le mot de passe doit contenir entre 8 et 50 caractères, incluant au moins une majuscule, une minuscule, un chiffre et un caractère spécial.");
            return;
        }

        fetch('http://127.0.0.1:5000/api/v1/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, email: email, password: password })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw new Error(err.error || "Erreur lors de l'inscription"); });
            }
            return response.json();
        })
        .then(data => {
            alert("Compte créé avec succès ! Vous pouvez maintenant vous connecter.");
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('login-email').value = email;
        })
        .catch(error => {
            console.error('Erreur:', error);
            alert(error.message || "Impossible de joindre le serveur.");
        });
    });
</script>

</body>
</html>
