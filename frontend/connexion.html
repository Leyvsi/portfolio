<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Petits Enquêteurs - Connexion</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}
.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}
#bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(11, 11, 13, 0.8);
}
.main-header {
    z-index: 1;
}
.auth-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    padding: 20px;
}
.auth-wrapper .content-section {
    margin: 0;
    width: 100%;
    max-width: 450px;
}
.admin-access {
    text-align: center;
    padding: 20px;
    z-index: 1;
}
.btn-admin {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
}
.btn-admin:hover {
    color: #ffffff;
    text-decoration: underline;
}
.toggle-text {
    text-align: center;
    margin-top: 20px;
    color: var(--text-main);
    font-size: 0.95rem;
}
.toggle-text a {
    color: #d63031;
    text-decoration: none;
    font-weight: 500;
}
.toggle-text a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="video-container">
<video autoplay loop muted playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
</div>

<header class="main-header">
    <h1>Les Petits Enquêteurs</h1>
</header>

<div class="auth-wrapper">
    <main class="content-section" id="login-box">
        <h2>Connexion Utilisateur</h2>
        <form class="submission-form" id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Votre email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-form-button">Se connecter</button>
        </form>
        <p class="toggle-text">Toujours pas de compte ? <a href="#" id="show-register">Inscrivez-vous ici !</a></p>
    </main>

    <main class="content-section" id="register-box" style="display: none;">
        <h2>Inscription</h2>
        <form class="submission-form" id="register-form">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" placeholder="Identifiant" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Votre email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-password" placeholder="••••••••" maxlength="50" required>
            </div>
            <button type="submit" class="submit-form-button">S'inscrire</button>
        </form>
        <p class="toggle-text">Déjà un compte ? <a href="#" id="show-login">Connectez-vous ici !</a></p>
    </main>
</div>

<div class="admin-access">
    <a href="admin-connexion.html" class="btn-admin">Pour les admins</a>
</div>

<script>
    document.getElementById('show-register').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('register-box').style.display = 'block';
    });
