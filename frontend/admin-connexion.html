<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Enquêteurs - Administration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Simple English comment: Video background layout matching other login routes -->
    <div class="video-container">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header class="main-header" style="z-index: 1;">
        <div class="header-spacer"></div>
        <h1>Les Petits Enquêteurs</h1>
        <div></div>
    </header>

    <main class="content-section" style="padding-top: 50px; z-index: 1;">
        <div class="login-card">
            <div id="feedback-alert" class="alert-box"></div>

            <h2 class="login-title">Connexion Administration</h2>

            <form id="admin-login-form" class="form-container" onsubmit="handleAdminLogin(event)">
                <div class="input-group">
                    <label for="admin-username">Identifiant Privé *</label>
                    <input type="text" id="admin-username" placeholder="Entrez votre identifiant" required>
                </div>
                
                <div class="input-group">
                    <label for="admin-password">Mot de passe *</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit-pill">Accéder au Panel</button>
            </form>

            <div class="bottom-links" style="justify-content: center;">
                <a href="connexion.html" style="color: #f39c12; font-weight: bold;">← Retour connexion standard</a>
            </div>
        </div>

        <div class="back-home-container">
            <a href="index.html" class="back-home-link">← Retour à l'accueil</a>
        </div>
    </main>

    <footer>
        <p>&copy; Les Petits Enquêteurs. 2026 - Tous droits réservés.</p>
    </footer>

    <script>
        const alertBox = document.getElementById('feedback-alert');

        function showAlert(message, type) {
            alertBox.style.display = 'block';
            alertBox.innerText = message;
            alertBox.className = `alert-box alert-${type}`;
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;

            // Simple English comment: Fetch authentication using the secure login route
            fetch('http://127.0.0.1:5000/api/v1/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.message || "Identifiants incorrects."); });
                }
                return res.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    // Check if the user has administrative privileges
                    if (data.is_admin) {
                        localStorage.setItem('username', data.username);
                        localStorage.setItem('is_admin', data.is_admin);
                        showAlert("Accès autorisé ! Redirection vers le tableau de bord...", "success");
                        setTimeout(() => { window.location.href = "./admin-dashboard.html"; }, 1500);
                    } else {
                        showAlert("Accès refusé. Cette zone est réservée exclusivement aux administrateurs.", "error");
                    }
                } else {
                    showAlert(data.message, "error");
                }
            })
            .catch(error => {
                showAlert(error.message || "Impossible de joindre le serveur d'authentification.", "error");
            });
        }
    </script>
</body>
</html>
