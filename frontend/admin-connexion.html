<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Petits Enquêteurs - Administration</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}
.auth-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    padding: 20px;
}
.auth-wrapper .content-section {
    margin: 0;
    width: 100%;
    max-width: 450px;
}
.bottom-navigation {
    text-align: center;
    padding: 30px;
    z-index: 1;
}
.btn-secondary {
    background: transparent;
    color: #ffffff;
    border: 2px solid var(--accent-color);
    padding: 8px 20px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 0.9rem;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 0 10px rgba(192, 57, 43, 0.2);
}
.btn-secondary:hover {
    background: var(--gradient-accent);
    transform: translateY(-1px);
    box-shadow: 0 0 15px rgba(214, 48, 49, 0.4);
}
</style>
</head>
<body>

<div class="video-container">
<video autoplay loop muted playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
</div>

<header style="z-index: 1;">
<h1>Les Petits Enquêteurs</h1>
</header>

<div class="auth-wrapper">
    <main class="content-section">
    <h2>Connexion Administration</h2>

    <form class="submission-form" id="admin-login-form">
    <div class="form-group">
    <label for="admin-username">Identifiant Privé</label>
    <input type="text" id="admin-username" name="username" placeholder="Identifiant" required>
    </div>
    <div class="form-group">
    <label for="admin-password">Mot de passe</label>
    <input type="password" id="admin-password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="submit-form-button">Accéder au Panel</button>
    </form>
    </main>
</div>

<div class="bottom-navigation">
    <a href="index.html" class="btn-secondary">Retour à l'accueil</a>
</div>

<script>
document.getElementById('admin-login-form').addEventListener('submit', function(event) {
event.preventDefault();
const username = document.getElementById('admin-username').value.trim();
const password = document.getElementById('admin-password').value;

fetch('http://127.0.0.1:5000/api/admin/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username: username, password: password })
})
.then(response => {
if (!response.ok) {
return response.json().then(err => { throw new Error(err.error || err.message || "Erreur de connexion"); });
}
return response.json();
})
.then(data => {
if (data.status === 'success') {
alert(data.message);
localStorage.setItem('adminToken', data.token);
window.location.href = "./admin-dashboard.html";
} else {
alert(data.message);
}
})
.catch(error => {
console.error('Erreur:', error);
alert(error.message || "Impossible de joindre le serveur.");
});
});
</script>
</body>
</html>
