<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Enquêteurs - Administration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header>
        <h1>Les Petits Enquêteurs</h1>
    </header>

    <main class="content-section">
        <h2>Connexion Administration</h2>
        
        <form class="submission-form" id="admin-login-form">
            <div class="form-group">
                <label for="admin-username">Identifiant Privé</label>
                <input type="text" id="admin-username" name="username" placeholder="Identifiant" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Mot de passe</label>
                <input type="password" id="admin-password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-form-button">Accéder au Panel</button>
        </form>
    </main>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;

            fetch('http://127.0.0.1:5000/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.message); });
                }
                return response.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    alert(data.message);
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = "./admin-dashboard.html";
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                alert(error.message || "Impossible de joindre le serveur.");
            });
        });
    </script>
</body>
</html>
