<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Enquêteurs - Les Théories</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Les Petits Enquêteurs</h1>
    </header>

    <nav>
        <ul class="navbar">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="histoires.html">Les Histoires</a></li>
            <li><a href="coldscases.html">Les Colds Cases</a></li>
            <li><a href="updates.html">Les Updates</a></li>
            <li><a href="theories.html" class="active">Les Théories</a></li>
            <li><a href="top-dossiers.html">Top Dossiers</a></li>
        </ul>
    </nav>

    <main class="content-section">
        <h2>Espace Analyse & Théories</h2>
        
        <div class="form-group" style="margin-bottom: 30px;">
            <label for="case-selector" style="display:block; margin-bottom:10px; font-size:1.2rem;">Sélectionnez une affaire en cours :</label>
            <select id="case-selector" style="width:100%; padding:12px; background:#1a1a1c; color:#fff; border:1px solid #444; border-radius:4px; font-size:1.1rem;">
                <option value="cc1">Le Mystère d'Anthonioz : Les Empreintes de la Nuit</option>
                <option value="cc2">L'Inconnue de la Plage de Noirval</option>
                <option value="cc3">Le Vol 814 : Le Passager Fantôme</option>
            </select>
        </div>

        <h3>Théories de la Communauté</h3>
        <div id="theories-list" style="margin-bottom:40px;"></div>

        <hr style="border-color:#333; margin-bottom:40px;">

        <h3>Proposer votre propre théorie</h3>
        <form id="theory-form" class="submission-form">
            <div class="form-group">
                <label for="theory-text">Votre hypothèse d'enquêteur</label>
                <textarea id="theory-text" rows="5" placeholder="Décrivez votre piste d'analyse de l'affaire..." required></textarea>
            </div>
            <button type="submit" class="submit-form-button">Soumettre la Théorie</button>
        </form>
    </main>

    <footer>
        <p>&copy; Les Petits Enquêteurs. 2026 - Tous droits réservés.</p>
    </footer>

    <script>
        const caseSelector = document.getElementById('case-selector');
        const theoriesList = document.getElementById('theories-list');
        const theoryForm = document.getElementById('theory-form');

        const urlParams = new URLSearchParams(window.location.search);
        const caseParam = urlParams.get('case');
        if (caseParam) {
            caseSelector.value = caseParam;
        }

        function loadTheories(caseId) {
            fetch(`http://127.0.0.1:5000/api/theories/${caseId}`)
                .then(res => res.json())
                .then(data => {
                    theoriesList.innerHTML = '';
                    if (data.theories.length === 0) {
                        theoriesList.innerHTML = '<p style="color:#aaa;">Aucune théorie proposée pour le moment. Soyez le premier !</p>';
                        return;
                    }
                    data.theories.forEach(theory => {
                        const div = document.createElement('div');
                        div.style.background = '#0f0f10';
                        div.style.border = '1px solid #333';
                        div.style.padding = '20px';
                        div.style.borderRadius = '6px';
                        div.style.marginBottom = '15px';
                        div.style.display = 'flex';
                        div.style.justifyContent = 'space-between';
                        div.style.alignItems = 'center';

                        div.innerHTML = `
                            <p style="color:#fff; margin:0; padding-right:20px; line-height:1.5;">${theory.text}</p>
                            <button onclick="likeTheory('${caseId}', ${theory.id})" style="background:#222; border:1px solid #555; color:#fff; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold; white-space:nowrap; transition: background 0.2s;">
                                ❤️ Like (<span id="like-count-${theory.id}">${theory.likes}</span>)
                            </button>
                        `;
                        theoriesList.appendChild(div);
                    });
                });
        }

        function likeTheory(caseId, theoryId) {
            fetch(`http://127.0.0.1:5000/api/theories/${caseId}/${theoryId}/like`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById(`like-count-${theoryId}`).textContent = data.likes;
                }
            });
        }

        caseSelector.addEventListener('change', (e) => loadTheories(e.target.value));

        theoryForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const currentCase = caseSelector.value;
            const textValue = document.getElementById('theory-text').value;

            fetch(`http://127.0.0.1:5000/api/theories/${currentCase}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textValue })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('theory-text').value = '';
                    loadTheories(currentCase);
                } else {
                    alert(data.message);
                }
            });
        });

        loadTheories(caseSelector.value);
    </script>
</body>
</html>
