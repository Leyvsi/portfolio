<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Petits Enquêteurs - Espace Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <script>
        if (!localStorage.getItem('adminToken')) {
            alert("Accès refusé. Autorisation administrateur manquante.");
            window.location.href = "admin-connexion.html";
        }
    </script>

    <header>
        <h1>Panel Administration</h1>
        <a href="index.html" class="account-button">Retour au Site</a>
    </header>

    <main class="content-section">
        <h2>Statistiques de fréquentation</h2>
        <div class="dashboard-stats" style="background: #0f0f10; padding: 20px; border-radius: 8px; border: 1px solid #444; margin-bottom: 30px;">
            <p style="font-size: 1.2rem;">Nombre de visites totales : <span id="visit-count" style="color: #c0392b; font-weight: bold;">0</span></p>
        </div>
    </main>

    <script>
        fetch('http://127.0.0.1:5000/api/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('visit-count').textContent = data.visits;
            })
            .catch(err => console.error("Erreur de récupération des stats:", err));
    </script>
</body>
</html>
